version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    allow:
      - dependency-type: direct
    ignore:
      # Avoid noisy major bumps — those need human review
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      backend-dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      backend-prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    allow:
      - dependency-type: direct
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      # Expo SDK versions are pinned deliberately
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "react-native"
    groups:
      mobile-dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      mobile-prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
