# fly.toml app configuration file generated for tgp-finance-api on 2026-03-14T17:39:05-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tgp-finance-api'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  # Run database migrations once per release, before new VMs boot.
  # Fly runs this in a temporary VM with full app env/secrets injected.
  # Smart script: tries migrate deploy, falls back to db push --accept-data-loss
  # on baseline conflicts (P3005/P3018 "already exists"). Safe right now
  # because prod DB only has test data.
  #
  # Invoke with bash explicitly: the script uses `set -euo pipefail` and other
  # bashisms, and Fly's release-VM `sh` is dash, which rejects them with
  # "Illegal option -" (this killed the previous deploy after PR #95).
  release_command = 'bash ./scripts/release.sh'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
